<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>tryit — study quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#ff6eb4;--pink2:#ff9dd6;--pinkd:#c2185b;
  --yellow:#ffd600;--orange:#ff9800;--red:#f44336;
  --purple:#c084fc;--blue:#60a5fa;--teal:#22d3ee;
  --green:#4ade80;--greend:#166534;
  --white:#fff;--dark:#0d0d1a;--darker:#07070f;
  --panel:#13132a;--panel2:#1a1a35;--panel3:#0f0f24;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --font-game:'Press Start 2P',monospace;
  --font-mono:'JetBrains Mono',monospace;
  --text:#e2e8f0;--muted:#94a3b8;--dim:#475569;
}
html,body{height:100%;background:var(--darker);overflow:hidden;font-family:var(--font-mono);color:var(--text)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:rgba(255,110,180,0.3);border-radius:3px}
::-webkit-scrollbar-track{background:transparent}

/* ── APP LAYOUT ── */
.app{display:grid;grid-template-rows:auto auto 1fr;height:100vh;overflow:hidden}

/* ── HUD ── */
.hud{
  background:var(--panel);border-bottom:2px solid rgba(255,110,180,0.4);
  padding:7px 14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  flex-shrink:0;z-index:20;position:relative;
}
.hud-logo{font-family:var(--font-game);font-size:9px;color:var(--pink);letter-spacing:1px;white-space:nowrap;flex-shrink:0}
.hud-logo b{color:var(--yellow)}
.hud-sep{color:var(--border2);font-size:16px;flex-shrink:0}
.hud-stat{display:flex;align-items:center;gap:5px;flex-shrink:0}
.hud-lbl{font-family:var(--font-game);font-size:6px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em}
.hud-v{font-family:var(--font-game);font-size:8px;color:var(--yellow)}
.hud-v.pink{color:var(--pink)}
.hud-v.green{color:var(--green)}
.hud-v.white{color:#fff}
.xp-wrap{display:flex;align-items:center;gap:6px}
.xp-bar{width:72px;height:7px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,0.12)}
.xp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--pink),var(--yellow));transition:width .4s ease;width:0%}
.hearts{display:flex;gap:3px;align-items:center}
.heart{font-size:13px;transition:opacity .2s;filter:drop-shadow(0 0 3px var(--pink))}
.heart.empty{opacity:.2;filter:none}
.coin-row{display:flex;align-items:center;gap:4px}
.coin{width:11px;height:11px;border-radius:50%;background:var(--yellow);border:2px solid #b45309;flex-shrink:0;animation:spin 2s linear infinite}
@keyframes spin{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.15)}}
.flame{font-size:13px;animation:pulse .8s ease-in-out infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.2)}}
.hud-right{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
.hbtn{
  font-family:var(--font-game);font-size:6px;padding:5px 8px;border-radius:4px;cursor:pointer;
  background:rgba(255,255,255,0.05);border:1px solid var(--border2);color:var(--muted);
  transition:all .12s;white-space:nowrap;
}
.hbtn:hover{background:rgba(255,110,180,.18);border-color:var(--pink);color:var(--pink)}
.hbtn.on{background:rgba(255,110,180,.15);border-color:var(--pink);color:var(--pink)}

/* ── WORLD STRIP ── */
.world-strip{
  background:var(--panel3);border-bottom:1px solid var(--border);
  padding:6px 14px;display:flex;align-items:center;overflow-x:auto;
  scrollbar-width:none;flex-shrink:0;
}
.world-strip::-webkit-scrollbar{display:none}
.wpath{display:flex;align-items:center}
.wnode{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;padding:0 8px;transition:transform .15s;flex-shrink:0;
}
.wnode:hover:not(.locked){transform:translateY(-2px)}
.wnode.locked{cursor:not-allowed;opacity:.35}
.wnode-icon{font-size:18px;line-height:1;transition:filter .2s}
.wnode.active .wnode-icon{animation:nbounce .6s ease-in-out infinite alternate;filter:drop-shadow(0 0 6px var(--yellow))}
@keyframes nbounce{from{transform:translateY(0)}to{transform:translateY(-4px)}}
.wnode-label{font-family:var(--font-game);font-size:5.5px;color:var(--dim);text-align:center;line-height:1.4;max-width:56px}
.wnode.done .wnode-label{color:var(--green)}
.wnode.active .wnode-label{color:var(--yellow)}
.wnode-stars{font-size:7px;color:var(--yellow);min-height:8px}
.wline{width:20px;height:2px;background:rgba(255,255,255,.1);border-radius:1px;margin-bottom:14px;flex-shrink:0}
.wline.done{background:var(--green)}

/* ── MAIN GRID ── */
.main{display:grid;grid-template-columns:1fr 230px;min-height:0;overflow:hidden}

/* ── TERMINAL ── */
.tpanel{display:grid;grid-template-rows:auto auto 1fr auto auto;min-height:0;border-right:1px solid var(--border)}

/* titlebar */
.tbar{
  display:flex;align-items:center;gap:8px;padding:7px 12px;
  background:var(--panel2);border-bottom:1px solid var(--border);flex-shrink:0;
}
.tdots{display:flex;gap:5px}
.tdot{width:10px;height:10px;border-radius:50%}
.tdot.r{background:#ff5f57}.tdot.y{background:#febc2e}.tdot.g{background:#28c840}
.ttabs{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none}
.ttabs::-webkit-scrollbar{display:none}
.ttab{font-family:var(--font-game);font-size:6px;padding:4px 10px;border-radius:4px;cursor:pointer;color:var(--dim);white-space:nowrap;transition:all .1s}
.ttab.active{background:rgba(255,110,180,.14);color:var(--pink)}
.ttab:not(.active):hover{background:rgba(255,255,255,.04);color:var(--muted)}
.taddtab{font-size:15px;color:var(--dim);cursor:pointer;padding:2px 4px;border-radius:4px;transition:all .1s;line-height:1;flex-shrink:0}
.taddtab:hover{color:var(--text);background:rgba(255,255,255,.06)}
.tbtns{display:flex;gap:2px;margin-left:auto}
.tbtn{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--dim);cursor:pointer;transition:all .1s}
.tbtn:hover{background:rgba(255,255,255,.06);color:var(--text)}
.tbtn.on{color:var(--pink)}

/* story box */
.story{
  background:var(--panel2);border-bottom:1px solid var(--border);
  padding:9px 13px;display:flex;gap:10px;align-items:flex-start;flex-shrink:0;
}
.kirby{font-size:26px;flex-shrink:0;animation:sway 1.2s ease-in-out infinite alternate;filter:drop-shadow(0 0 5px var(--pink));line-height:1;cursor:pointer}
@keyframes sway{from{transform:rotate(-5deg) scale(1)}to{transform:rotate(5deg) scale(1.06)}}
.story-wrap{flex:1;min-width:0}
.story-who{font-family:var(--font-game);font-size:6.5px;color:var(--pink);margin-bottom:3px}
.story-msg{font-family:var(--font-game);font-size:6.5px;line-height:1.9;color:rgba(255,255,255,.9);min-height:24px}
.story-msg .cur{display:inline-block;width:6px;height:9px;background:var(--pink);vertical-align:text-bottom;animation:blink .7s step-end infinite;margin-left:1px}
@keyframes blink{50%{opacity:0}}
.story-hint{font-family:var(--font-game);font-size:5.5px;color:var(--dim);cursor:pointer;margin-top:3px;transition:color .1s}
.story-hint:hover{color:var(--pink)}

/* output */
.output{overflow-y:auto;padding:11px 15px 6px;font-size:12.5px;line-height:1.65;min-height:0;background:var(--darker)}
.line{display:flex;align-items:flex-start;min-height:1.65em}
.line.cline{margin-top:5px}
.ps1s{flex-shrink:0;white-space:pre}
.out{white-space:pre-wrap;word-break:break-word;width:100%}
.ct{color:var(--text)}.cm{color:var(--muted)}.cd{color:var(--dim)}
.cs{color:var(--green)}.cw{color:#fbbf24}.ce{color:#f87171}
.ci{color:var(--blue)}.cp{color:var(--purple)}.cc{color:var(--teal)}
.cy{color:var(--yellow)}.cpk{color:var(--pink2)}
.line.new{animation:fup .1s ease forwards}
@keyframes fup{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}

/* quiz */
.qblock{background:rgba(255,110,180,.07);border:1px solid rgba(255,110,180,.22);border-radius:7px;padding:9px 11px;margin:5px 0;width:100%}
.qq{font-family:var(--font-game);font-size:6.5px;color:var(--pink2);margin-bottom:7px;line-height:1.9}
.qopts{display:flex;flex-direction:column;gap:3px}
.qopt{font-family:var(--font-game);font-size:6.5px;padding:4px 8px;border-radius:4px;border:1px solid var(--border2);background:rgba(255,255,255,.03);cursor:pointer;color:var(--muted);transition:all .1s;text-align:left}
.qopt:hover{background:rgba(255,110,180,.14);border-color:var(--pink);color:#fff}
.qopt.ok{background:rgba(74,222,128,.18);border-color:var(--green);color:var(--green);pointer-events:none}
.qopt.no{background:rgba(248,113,113,.13);border-color:var(--red);color:#f87171;pointer-events:none}
.qopt.disabled{pointer-events:none;opacity:.45}
.qres{font-family:var(--font-game);font-size:6.5px;margin-top:5px;line-height:1.8}

/* suggestions */
.sugbar{display:flex;gap:5px;padding:7px 13px;border-top:1px solid var(--border);flex-wrap:wrap;background:rgba(0,0,0,.25);flex-shrink:0}
.sug{font-family:var(--font-game);font-size:6px;padding:3px 8px;border-radius:4px;border:1px solid var(--border2);color:var(--muted);cursor:pointer;transition:all .1s;white-space:nowrap}
.sug:hover{background:rgba(255,110,180,.14);border-color:var(--pink);color:var(--pink)}

/* input */
.irow{display:flex;align-items:center;padding:8px 13px 10px;border-top:1px solid var(--border);background:rgba(0,0,0,.3);flex-shrink:0;gap:0}
.ips1{font-size:12px;white-space:pre;flex-shrink:0;pointer-events:none}
.cin{flex:1;background:transparent;border:none;outline:none;color:var(--teal);font-size:12px;font-family:var(--font-mono);caret-color:var(--pink);min-width:0}
.cin::placeholder{color:var(--dim)}
.rbtn{background:rgba(255,110,180,.12);border:1px solid rgba(255,110,180,.28);color:var(--pink);padding:5px 11px;border-radius:5px;font-size:11px;cursor:pointer;font-family:var(--font-game);transition:all .12s;white-space:nowrap;flex-shrink:0}
.rbtn:hover{background:rgba(255,110,180,.24);border-color:var(--pink2)}
.rbtn:active{transform:scale(.95)}

/* ── SIDE ── */
.side{display:grid;grid-template-rows:auto 1fr auto;background:var(--panel);min-height:0;overflow:hidden}
.stabs{display:flex;border-bottom:1px solid var(--border)}
.stab{flex:1;font-family:var(--font-game);font-size:6px;padding:8px 3px;text-align:center;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;transition:all .1s;line-height:1.4}
.stab.active{color:var(--pink);border-bottom-color:var(--pink)}
.stab:hover:not(.active){color:var(--muted)}
.scontent{overflow-y:auto;padding:10px;min-height:0}

/* skill items */
.skill{display:flex;align-items:center;gap:7px;padding:5px;border-radius:5px;margin-bottom:4px;border:1px solid var(--border);background:rgba(255,255,255,.015)}
.skill-ico{font-size:14px;flex-shrink:0}
.skill-info{flex:1;min-width:0}
.skill-name{font-family:var(--font-game);font-size:5.5px;color:rgba(255,255,255,.8);margin-bottom:3px}
.skill-bar{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.skill-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--pink),var(--purple));transition:width .5s}

/* daily card */
.daily{background:rgba(255,214,0,.07);border:1px solid rgba(255,214,0,.22);border-radius:7px;padding:9px;margin-bottom:8px}
.daily-t{font-family:var(--font-game);font-size:6.5px;color:var(--yellow);margin-bottom:5px}
.daily-d{font-family:var(--font-game);font-size:6px;color:rgba(255,255,255,.55);line-height:1.9;margin-bottom:7px}
.daily-btn{font-family:var(--font-game);font-size:6px;padding:5px;border-radius:4px;cursor:pointer;background:rgba(255,214,0,.14);border:1px solid rgba(255,214,0,.35);color:var(--yellow);width:100%;transition:all .1s}
.daily-btn:hover{background:rgba(255,214,0,.24)}

/* inventory */
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.islot{aspect-ratio:1;border-radius:5px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:15px;background:rgba(255,255,255,.03);cursor:pointer;transition:all .15s}
.islot:hover:not(.empty){border-color:var(--pink);background:rgba(255,110,180,.1);transform:scale(1.08)}
.islot.empty{opacity:.2;cursor:default}

/* leaderboard */
.lbrow{display:flex;align-items:center;gap:5px;padding:5px;border-radius:5px;margin-bottom:3px}
.lbrank{font-family:var(--font-game);font-size:6.5px;color:var(--dim);width:14px;text-align:right;flex-shrink:0}
.lbav{font-size:13px;flex-shrink:0}
.lbname{font-family:var(--font-game);font-size:6px;color:var(--muted);flex:1;min-width:0;overflow:hidden;white-space:nowrap}
.lbscore{font-family:var(--font-game);font-size:6.5px;color:var(--yellow)}
.lbrow.me{background:rgba(255,110,180,.1);border:1px solid rgba(255,110,180,.18)}
.lbrow.me .lbname{color:var(--pink)}

/* statusbar */
.sbar{display:flex;align-items:center;gap:10px;padding:5px 13px;background:var(--panel3);border-top:1px solid var(--border);font-family:var(--font-game);font-size:6px;color:var(--dim);flex-shrink:0}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;transition:background .2s}
.sdot.busy{background:var(--yellow)}.sdot.err{background:var(--red)}
.sright{margin-left:auto;display:flex;gap:10px}

/* ── TOASTS ── */
.toastwrap{position:fixed;top:72px;right:14px;z-index:999;display:flex;flex-direction:column;gap:5px;pointer-events:none}
.toast{background:var(--panel2);border:2px solid var(--yellow);border-radius:7px;padding:7px 11px;display:flex;gap:7px;align-items:center;animation:tin .28s ease,tout .28s ease 2.7s forwards;pointer-events:none;max-width:240px}
@keyframes tin{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes tout{from{opacity:1}to{opacity:0;transform:translateX(110%)}}
.toast-ico{font-size:18px;flex-shrink:0}
.toast-t{font-family:var(--font-game);font-size:6.5px;color:var(--yellow);margin-bottom:2px}
.toast-s{font-family:var(--font-game);font-size:5.5px;color:var(--muted)}

/* ── FLOATING POPS ── */
.fpop{position:fixed;pointer-events:none;z-index:998;animation:fpopA .9s ease forwards}
@keyframes fpopA{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-52px) scale(.5)}}
.fpop.xp{font-family:var(--font-game);font-size:8px;color:var(--pink);text-shadow:0 0 6px var(--pink)}
.fpop.coin{font-family:var(--font-game);font-size:8px;color:var(--yellow);text-shadow:0 0 6px var(--yellow)}

/* ── LEVEL UP OVERLAY ── */
.lvlup{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:500;animation:fadein .3s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.lvlup-inner{text-align:center;padding:28px;max-width:320px}
.lvlup-stars{font-size:28px;margin-bottom:10px;animation:starspn 1s ease}
@keyframes starspn{from{transform:scale(0) rotate(-180deg)}to{transform:scale(1) rotate(0)}}
.lvlup-t{font-family:var(--font-game);font-size:18px;color:var(--yellow);margin-bottom:7px;text-shadow:0 0 18px var(--yellow);line-height:1.5}
.lvlup-s{font-family:var(--font-game);font-size:8px;color:var(--pink);margin-bottom:22px;line-height:2.2}
.lvlup-btn{font-family:var(--font-game);font-size:8px;padding:10px 22px;border-radius:5px;cursor:pointer;background:var(--yellow);color:var(--dark);border:none;transition:transform .1s}
.lvlup-btn:hover{transform:scale(1.05)}.lvlup-btn:active{transform:scale(.97)}

@media(max-width:680px){.main{grid-template-columns:1fr}.side{display:none}}
</style>
</head>
<body>

<div class="toastwrap" id="toastwrap"></div>

<!-- HUD -->
<div class="hud">
  <div class="hud-logo">try<b>it</b></div>
  <div class="hud-sep">◆</div>
  <div class="hud-stat"><span class="hud-lbl">lvl</span><span class="hud-v white" id="hLvl">1</span></div>
  <div class="hud-stat">
    <div class="xp-wrap">
      <span class="hud-lbl">xp</span>
      <div class="xp-bar"><div class="xp-fill" id="xpFill"></div></div>
      <span class="hud-v" id="hXp">0</span>
    </div>
  </div>
  <div class="hud-stat"><span class="hud-lbl">hp</span><div class="hearts" id="heartsEl"></div></div>
  <div class="hud-stat"><div class="coin-row"><div class="coin"></div><span class="hud-v" id="hCoins">0</span></div></div>
  <div class="hud-stat"><span class="flame">🔥</span><span class="hud-v pink" id="hStreak">0</span><span class="hud-lbl">streak</span></div>
  <div class="hud-right">
    <div class="hbtn on" id="btnSave">💾 save</div>
    <div class="hbtn" id="btnSound">🔊</div>
  </div>
</div>

<!-- WORLD STRIP -->
<div class="world-strip"><div class="wpath" id="wpath"></div></div>

<!-- MAIN -->
<div class="main">

  <!-- TERMINAL -->
  <div class="tpanel">
    <div class="tbar">
      <div class="tdots"><div class="tdot r"></div><div class="tdot y"></div><div class="tdot g"></div></div>
      <div class="ttabs" id="ttabs"></div>
      <span class="taddtab" id="addTab">+</span>
      <div class="tbtns">
        <div class="tbtn" id="btnClear" title="Clear">⌫</div>
        <div class="tbtn" id="btnHint" title="Hint (costs 1 coin)">💡</div>
        <div class="tbtn" id="btnSkip" title="Skip challenge">⏭</div>
        <div class="tbtn" id="btnWrap" title="Word wrap">↵</div>
      </div>
    </div>

    <!-- story -->
    <div class="story" id="storyEl">
      <div class="kirby" id="kirbyEl">🎮</div>
      <div class="story-wrap">
        <div class="story-who" id="storyWho">KIRBY</div>
        <div class="story-msg" id="storyMsg"></div>
        <div class="story-hint" id="storyHint">▶ press Enter or click to continue</div>
      </div>
    </div>

    <div class="output" id="output"></div>

    <div class="sugbar" id="sugbar"></div>

    <div class="irow">
      <span class="ips1" id="ips1"></span>
      <input class="cin" id="cin" placeholder="type a command… (try 'help')" autocomplete="off" spellcheck="false"/>
      <button class="rbtn" id="rbtn">▶ run</button>
    </div>
  </div>

  <!-- SIDE -->
  <div class="side">
    <div class="stabs">
      <div class="stab active" data-s="skills">⚔️<br>skills</div>
      <div class="stab" data-s="inv">🎒<br>items</div>
      <div class="stab" data-s="lb">🏆<br>ranks</div>
    </div>
    <div class="scontent" id="scontent"></div>
    <div class="sbar">
      <div class="sdot" id="sdot"></div>
      <span id="smsg">ready</span>
      <div class="sright"><span id="sbranch">⎇ main</span><span id="sclock"></span></div>
    </div>
  </div>
</div>

<!-- LEVEL UP -->
<div class="lvlup" id="lvlupEl">
  <div class="lvlup-inner">
    <div class="lvlup-stars">⭐✨🌟✨⭐</div>
    <div class="lvlup-t" id="lvlupT">LEVEL UP!</div>
    <div class="lvlup-s" id="lvlupS">You reached level 2!</div>
    <button class="lvlup-btn" id="lvlupBtn">CONTINUE →</button>
  </div>
</div>

<script>
// ═══════════════════════════
//  STATE
// ═══════════════════════════
const G={
  xp:0,level:1,coins:0,hp:3,maxHp:3,streak:0,cmdCount:0,
  quizRight:0,storyDone:false,
  achievements:new Set(),
  skills:{linux:0,git:0,js:0,bash:0,python:0},
  world:0,
  challenge:null,challengeIdx:0,
  tabs:[{id:1,name:'bash',lines:[]}],
  tab:0,tabN:1,
  hist:[],histI:-1,
  wrap:true,sTab:'skills',
};

function updHUD(){
  hLvl.textContent=G.level;
  hXp.textContent=G.xp;
  hCoins.textContent=G.coins;
  hStreak.textContent=G.streak;
  const lo=XP_LVL[G.level-1]||0,hi=XP_LVL[G.level]||9999;
  xpFill.style.width=Math.min(100,((G.xp-lo)/(hi-lo))*100)+'%';
  heartsEl.innerHTML='';
  for(let i=0;i<G.maxHp;i++){
    const h=document.createElement('span');
    h.className='heart'+(i<G.hp?' ':' empty');h.textContent='♥';
    heartsEl.appendChild(h);
  }
}

function addXP(n,el){
  G.xp+=n;pop('+'+n+'xp',el,'xp');
  checkLvl();updHUD();
}
function addCoins(n,el){
  G.coins+=n;pop('+'+n+'🪙',el,'coin');
  updHUD();checkAchs();
}
function loseHP(){
  G.hp=Math.max(0,G.hp-1);G.streak=0;updHUD();
  if(G.hp<=0){toast('💀','Knocked Out!','Respawning…');G.hp=G.maxHp;updHUD();}
}
function checkLvl(){
  const next=XP_LVL[G.level]||99999;
  if(G.xp>=next&&G.level<9){
    G.level++;
    lvlupT.textContent='LEVEL UP!';
    lvlupS.textContent=`You reached Level ${G.level}!\n+1 Heart restored ✨`;
    G.hp=Math.min(G.maxHp,G.hp+1);
    lvlupEl.style.display='flex';
    updHUD();checkAchs();
  }
}
function checkAchs(){
  ACHS.forEach(a=>{
    if(!G.achievements.has(a.id)&&a.ok()){
      G.achievements.add(a.id);
      toast(a.ico,a.t,a.s);
    }
  });
}
function pop(txt,ref,type){
  const el=document.createElement('div');
  el.className='fpop '+type;el.textContent=txt;
  const r=(ref||rbtn).getBoundingClientRect();
  el.style.left=r.left+'px';el.style.top=(r.top-10)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),920);
}
function toast(ico,t,s){
  const el=document.createElement('div');
  el.className='toast';
  el.innerHTML=`<div class="toast-ico">${ico}</div><div><div class="toast-t">${t}</div><div class="toast-s">${s}</div></div>`;
  toastwrap.appendChild(el);
  setTimeout(()=>el.remove(),3100);
}

let sq=[],si=0,typing=false,skipT=false;

function queueStory(lines){sq=lines;si=0;nextStory();}
function nextStory(){
  if(si>=sq.length){
    storyMsg.innerHTML='<span class="cd">— ready. type a command or try "quiz" —</span>';
    storyHint.textContent='';
    G.storyDone=true;
    showChallenge();
    return;
  }
  const l=sq[si++];
  storyWho.textContent=l.who;
  kirbyEl.textContent=l.av;
  typeText(l.t);
}
function typeText(txt){
  typing=true;skipT=false;storyMsg.innerHTML='';
  let i=0;
  function step(){
    if(skipT){storyMsg.textContent=txt;addCur();typing=false;storyHint.textContent='▶ press Enter or click to continue';return;}
    if(i<txt.length){storyMsg.textContent=txt.slice(0,++i);addCur();setTimeout(step,22);}
    else{typing=false;storyHint.textContent='▶ press Enter or click to continue';}
  }
  function addCur(){const c=document.createElement('span');c.className='cur';storyMsg.appendChild(c);}
  storyHint.textContent='';
  step();
}
function advStory(){if(typing){skipT=true;return;}nextStory();}
storyHint.addEventListener('click',advStory);
kirbyEl.addEventListener('click',advStory);

function renderMap(){
  wpath.innerHTML='';
  WORLDS.forEach((w,i)=>{
    const nd=document.createElement('div');
    nd.className='wnode'+(w.done?' done':'')+(w.locked?' locked':'')+(i===G.world?' active':'');
    nd.innerHTML=`<div class="wnode-icon">${w.icon}</div><div class="wnode-label">${w.label}</div><div class="wnode-stars">${w.done?'★★★':i===G.world?'☆☆☆':''}</div>`;
    if(!w.locked)nd.addEventListener('click',()=>enterWorld(i));
    wpath.appendChild(nd);
    if(i<WORLDS.length-1){
      const ln=document.createElement('div');
      ln.className='wline'+(w.done?' done':'');
      wpath.appendChild(ln);
    }
  });
}
function enterWorld(i){
  G.world=i;G.challengeIdx=0;G.challenge=null;
  renderMap();
  const w=WORLDS[i];
  clearOutput();
  G.storyDone=false;
  queueStory(STORIES[w.topic]||STORIES.intro);
  appendLine('cpk',`\n  ══ Entered: ${w.icon} ${w.label.replace('\n',' ')} ══\n`);
  updSkills();
  G.achievements.has('exp')||checkAchs();
}

// ═══════════════════════════
//  CHALLENGES
// ═══════════════════════════
function showChallenge(){
  const list=CHALLENGES[WORLDS[G.world].topic]||CHALLENGES.intro;
  if(G.challengeIdx>=list.length){worldDone();return;}
  const ch=list[G.challengeIdx];
  G.challenge=ch;
  renderChallenge(ch);
}
function renderChallenge(ch){
  const wrap=document.createElement('div');wrap.className='line new';
  const b=document.createElement('div');b.className='qblock';
  if(ch.type==='quiz'){
    b.innerHTML=`<div class="qq">⚔️ CHALLENGE: ${ch.q}</div><div class="qopts">${ch.opts.map((o,i)=>`<button class="qopt" data-i="${i}">${String.fromCharCode(65+i)}) ${o}</button>`).join('')}</div><div class="qres"></div>`;
    wrap.appendChild(b);output.appendChild(wrap);
    b.querySelectorAll('.qopt').forEach(btn=>btn.addEventListener('click',()=>answerQ(btn,ch,b)));
  } else {
    b.innerHTML=`<div class="qq">⌨️ TYPE IT: ${ch.prompt}</div><div class="qres"></div>`;
    wrap.appendChild(b);output.appendChild(wrap);
    appendLine('cd','  (type the exact command below and press Enter)');
  }
  output.scrollTop=output.scrollHeight;
}
function answerQ(btn,ch,b){
  const idx=parseInt(btn.dataset.i);
  b.querySelectorAll('.qopt').forEach(x=>x.classList.add('disabled'));
  const res=b.querySelector('.qres');
  if(idx===ch.correct){
    btn.classList.add('ok');
    res.innerHTML=`<span class="cs">✓ Correct! +${ch.xp}xp +${ch.coins}🪙</span>`;
    addXP(ch.xp,btn);addCoins(ch.coins,btn);
    G.streak++;G.quizRight++;updHUD();checkAchs();
    setTimeout(nextChallenge,1200);
  } else {
    btn.classList.add('no');
    b.querySelectorAll('.qopt')[ch.correct].classList.add('ok');
    res.innerHTML=`<span class="ce">✗ Wrong! Answer: ${ch.opts[ch.correct]}</span>`;
    loseHP();
    setTimeout(nextChallenge,1600);
  }
}
function checkTypeAns(input){
  const ch=G.challenge;
  if(!ch||ch.type!=='type')return false;
  if(input.trim().toLowerCase()===ch.answer.toLowerCase()){
    appendLine('cs',`  ✓ Correct! +${ch.xp}xp +${ch.coins}🪙`);
    addXP(ch.xp,rbtn);addCoins(ch.coins,rbtn);
    G.streak++;G.quizRight++;updHUD();checkAchs();
    G.challenge=null;setTimeout(nextChallenge,700);
    return true;
  }
  return false;
}
function nextChallenge(){G.challengeIdx++;G.challenge=null;showChallenge();}
function worldDone(){
  const w=WORLDS[G.world];w.done=true;
  if(G.world+1<WORLDS.length)WORLDS[G.world+1].locked=false;
  renderMap();
  appendLine('cy',`\n  🌟 WORLD COMPLETE! ${w.icon} ${w.label.replace('\n',' ')} 🌟`);
  appendLine('cpk','  Bonus: +50xp  +15🪙');
  addXP(50,output);addCoins(15,output);
  toast(w.icon,'World Complete!','+50xp +15 coins');
  G.skills[w.topic]=Math.min(100,(G.skills[w.topic]||0)+30);
  updSkills();checkAchs();
}

    return cs.flatMap(c=>[{c:'cp',v:`commit ${c.h}`},{c:'ct',v:`    ${c.m}`},{c:'',v:''}]);
  }},
  'git diff':{run(){return[{c:'cs',v:'+  // Kirby story mode'},{c:'cs',v:'+  // XP/coins/achievements'},{c:'ce',v:'-  // boring old terminal'}]}},
  'git add':{run(){G.skills.git=Math.min(100,G.skills.git+2);return[{c:'cm',v:'Changes staged. Run: git commit -m "message"'}]}},
  'git commit':{run(a){
    G.skills.git=Math.min(100,G.skills.git+3);
    const m=a.slice(a.indexOf('-m')+1).join(' ').replace(/"/g,'')||'update';
    addXP(10,rbtn);addCoins(2,rbtn);
    return[{c:'cs',v:`[main a1b2c3] ${m}`},{c:'cs',v:'1 file changed, 1 insertion(+)'}];
  }},
  'npm run dev':{run(){return[{c:'ci',v:'> tryit@2.0.0 dev'},{c:'',v:''},{c:'cs',v:'  VITE v5.2  ready in 241ms'},{c:'ct',v:'  ➜  Local: http://localhost:5173/'}]}},
  'npm install':{run(){return[{c:'cs',v:'added 42 packages in 1.4s'},{c:'cm',v:'3 packages are looking for funding'}]}},
  env:{run(){return[{c:'ct',v:`USER=hero`},{c:'ct',v:`LEVEL=${G.level}`},{c:'ct',v:`XP=${G.xp}`},{c:'ct',v:`COINS=${G.coins}`},{c:'ct',v:`WORLD=${WORLDS[G.world].icon} ${WORLDS[G.world].label.replace('\n',' ')}`},{c:'ct',v:`STREAK=${G.streak}`}]}},
  ping:{run(a){const h=a[0]||'localhost';return[{c:'ct',v:`PING ${h}`},{c:'cs',v:`64 bytes: icmp_seq=0 time=0.12ms`},{c:'cs',v:`64 bytes: icmp_seq=1 time=0.09ms`},{c:'ct',v:`3 packets: 0% loss`}]}},
  curl:{run(a){const u=a.find(x=>!x.startsWith('-'))||'';return u?[{c:'cm',v:`  % Total    % Received % Xferd`},{c:'ct',v:`{"status":"ok","url":"${u}"}`}]:[{c:'ce',v:'curl: no URL specified'}]}},
  quiz:{run(){
    if(!G.storyDone)return[{c:'cw',v:'Finish the story first! (press Enter)'}];
    G.storyDone=false;
    const list=CHALLENGES[WORLDS[G.world].topic]||CHALLENGES.intro;
    G.challengeIdx=0;G.challenge=null;
    clearOutput();
    appendLine('cy','  ⚔️ Challenge mode! Answer to earn XP!');
    appendLine('','');
    setTimeout(showChallenge,400);
    return[];
  }},
  next:{run(){
    if(G.world<WORLDS.length-1){enterWorld(G.world+1);return[{c:'cs',v:'Moving to next world…'}];}
    return[{c:'cw',v:'You\'re at the final world! Type "quiz" to fight the boss!'}];
  }},
  stats:{run(){return[
    {c:'cy',v:'╔══════════════════════════════╗'},
    {c:'cy',v:'║      ⚔️  HERO STATS  ⚔️      ║'},
    {c:'cy',v:'╚══════════════════════════════╝'},
    {c:'',v:''},
    {c:'cpk',v:`  Level   : ${G.level}`},
    {c:'cpk',v:`  XP      : ${G.xp}`},
    {c:'cpk',v:`  Coins   : ${G.coins}`},
    {c:'cpk',v:`  HP      : ${'♥'.repeat(G.hp)}${'♡'.repeat(G.maxHp-G.hp)}`},
    {c:'cpk',v:`  Streak  : ${G.streak}`},
    {c:'cpk',v:`  World   : ${WORLDS[G.world].icon} ${WORLDS[G.world].label.replace('\n',' ')}`},
    {c:'',v:''},
    {c:'cy',v:`  Achievements  : ${G.achievements.size} / ${ACHS.length}`},
    {c:'cy',v:`  Git skill     : ${G.skills.git}%`},
    {c:'cy',v:`  Linux skill   : ${G.skills.linux}%`},
    {c:'cy',v:`  Commands run  : ${G.cmdCount}`},
  ];}},
  shop:{run(){return[
    {c:'cy',v:'🛒 ITEM SHOP'},
    {c:'',v:''},
    {c:'cm',v:'  🍄 Mushroom     10🪙  Restore 1 HP'},
    {c:'cm',v:'  🔥 Fire Flower  15🪙  Reveal answer'},
    {c:'cm',v:'  ⭐ Super Star   25🪙  2× XP for 60s'},
    {c:'cm',v:'  🔔 Tanooki      20🪙  Skip challenge'},
    {c:'',v:''},
    {c:'cd',v:'  Shop coming in v2.1 — earn coins now!'},
  ];}},
};

// ═══════════════════════════
//  SUGGESTIONS
// ═══════════════════════════
const SUGS=['help','ls -la','pwd','git status','git log --oneline','quiz','stats','next','cat README.md','echo hello','clear','shop'];
function renderSugs(f=''){
  const items=f?SUGS.filter(s=>s.startsWith(f)&&s!==f):SUGS;
  sugbar.innerHTML='';
  items.slice(0,9).forEach(s=>{
    const el=document.createElement('span');el.className='sug';el.textContent=s;
    el.addEventListener('click',()=>{cin.value=s;cin.focus();});
    sugbar.appendChild(el);
  });
}
renderSugs();

// ═══════════════════════════
//  OUTPUT
// ═══════════════════════════
function appendLine(cls,text,animate=true){
  const d=document.createElement('div');d.className='line'+(animate?' new':'');
  if(!cls&&!text){d.innerHTML='<span style="display:block;height:.4em"></span>';}
  else{
    const s=document.createElement('span');
    s.className='out '+(cls||'ct');
    s.style.whiteSpace=G.wrap?'pre-wrap':'pre';
    s.textContent=text??'';
    d.appendChild(s);
  }
  output.appendChild(d);output.scrollTop=output.scrollHeight;
}
function appendCmdLine(raw){
  const d=document.createElement('div');d.className='line cline new';
  d.innerHTML=`<span class="ps1s">${ips1.innerHTML}</span><span style="color:var(--teal)">${esc(raw)}</span>`;
  output.appendChild(d);output.scrollTop=output.scrollHeight;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function clearOutput(){output.innerHTML='';G.tabs[G.tab].lines=[];}

// ═══════════════════════════
//  RUN
// ═══════════════════════════
function runCmd(raw){
  raw=raw.trim();if(!raw)return;
  if(!G.storyDone){advStory();return;}
  G.hist.unshift(raw);G.histI=-1;G.cmdCount++;
  appendCmdLine(raw);
  setSt('running','busy');

  if(G.challenge&&G.challenge.type==='type'){
    if(checkTypeAns(raw)){setSt('ready','ok');saveTL();return;}
  }

  setTimeout(()=>{
    const tok=raw.split(/\s+/);
    const cmd=tok[0].toLowerCase();
    const args=tok.slice(1);
    const full=raw.toLowerCase().replace(/\s+/,' ');

    let res;
    if(CMDS[full])res=CMDS[full].run(args);
    else if(CMDS[cmd])res=CMDS[cmd].run(args);
    else{
      res=[{c:'ce',v:`${tok[0]}: command not found`},{c:'cd',v:"type 'help' for commands"}];
      setSt('error','err');G.streak=0;updHUD();
      procRes(res);return;
    }
    if(res==='__CLEAR__'){clearOutput();setSt('ready','ok');return;}
    G.streak++;updHUD();checkAchs();
    if(G.cmdCount>1)addXP(2,rbtn);
    procRes(res);
    updSkills();
  },65);
}
function procRes(res){
  if(Array.isArray(res))res.forEach(r=>appendLine(r.c||'ct',r.v??''));
  setSt('ready','ok');saveTL();
}
function setSt(msg,state){smsg.textContent=msg;sdot.className='sdot'+(state==='busy'?' busy':state==='err'?' err':'');}

// ═══════════════════════════
//  TABS
// ═══════════════════════════
function renderTabs(){
  ttabs.innerHTML='';
  G.tabs.forEach((t,i)=>{
    const el=document.createElement('div');el.className='ttab'+(i===G.tab?' active':'');
    el.textContent=t.name;el.addEventListener('click',()=>switchTab(i));
    ttabs.appendChild(el);
  });
}
function switchTab(i){saveTL();G.tab=i;renderTabs();loadTL();renderPS1();}
function saveTL(){G.tabs[G.tab].lines=Array.from(output.children).map(e=>e.outerHTML);}
function loadTL(){output.innerHTML=G.tabs[G.tab].lines.join('');output.scrollTop=output.scrollHeight;}
function newTab(){
  saveTL();G.tabN++;
  G.tabs.push({id:G.tabN,name:`bash ${G.tabN}`,lines:[]});
  G.tab=G.tabs.length-1;renderTabs();loadTL();
  appendLine('cm',`new tab — bash ${G.tabN}`);cin.focus();
}

// ═══════════════════════════
//  SIDE PANEL
// ═══════════════════════════
function updSkills(){if(G.sTab==='skills')renderSkills();}
function renderSkills(){
  scontent.innerHTML='';
  const dc=document.createElement('div');dc.className='daily';
  dc.innerHTML=`<div class="daily-t">⚡ Daily Challenge</div><div class="daily-d">Complete 3 quizzes\ntoday for 30 bonus coins!</div><button class="daily-btn" onclick="cin.value='quiz';cin.focus()">▶ Start Quiz →</button>`;
  scontent.appendChild(dc);
  [{k:'linux',i:'🐧',n:'Linux'},{k:'git',i:'🌿',n:'Git'},{k:'js',i:'⚡',n:'JavaScript'},{k:'bash',i:'💻',n:'Bash'},{k:'python',i:'🐍',n:'Python'}].forEach(s=>{
    const v=G.skills[s.k]||0;
    const el=document.createElement('div');el.className='skill';
    el.innerHTML=`<div class="skill-ico">${s.i}</div><div class="skill-info"><div class="skill-name">${s.n} — ${v}%</div><div class="skill-bar"><div class="skill-fill" style="width:${v}%"></div></div></div>`;
    scontent.appendChild(el);
  });
}
function renderInv(){
  scontent.innerHTML='<div style="font-family:var(--font-game);font-size:6px;color:var(--dim);margin-bottom:8px">🎒 ITEM BAG</div>';
  const grid=document.createElement('div');grid.className='inv-grid';
  const ITEMS=['⭐','🍄','🔥','🔔','💎','🦸','🌟','🪙'];
  for(let i=0;i<16;i++){
    const sl=document.createElement('div');
    sl.className='islot'+(i<ITEMS.length?' ':' empty');
    sl.textContent=i<ITEMS.length?ITEMS[i]:'·';
    if(i<ITEMS.length)sl.title='Item '+ITEMS[i];
    grid.appendChild(sl);
  }
  scontent.appendChild(grid);
  const n=document.createElement('div');
  n.style.cssText='font-family:var(--font-game);font-size:5.5px;color:var(--dim);line-height:2';
  n.textContent='Items unlock as you\nprogress through worlds!';
  scontent.appendChild(n);
}
function renderLB(){
  scontent.innerHTML='<div style="font-family:var(--font-game);font-size:6px;color:var(--dim);margin-bottom:8px">🏆 LEADERBOARD</div>';
  const rows=[
    {av:'👑',name:'ProCoder99',score:8420},{av:'🦸',name:'gitmaster',score:7100},
    {av:'🐱',name:'bash_witch',score:5830},{av:'🎮',name:'YOU',score:G.xp,me:true},
    {av:'🤖',name:'codez4eva',score:3200},{av:'🍄',name:'toadcoder',score:2100},
  ].sort((a,b)=>b.score-a.score).map((r,i)=>({...r,rank:i+1}));
  rows.forEach(r=>{
    const el=document.createElement('div');el.className='lbrow'+(r.me?' me':'');
    el.innerHTML=`<div class="lbrank">${r.rank}</div><div class="lbav">${r.av}</div><div class="lbname">${r.name}</div><div class="lbscore">${r.score}</div>`;
    scontent.appendChild(el);
  });
}

document.querySelectorAll('.stab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');G.sTab=tab.dataset.s;
    if(G.sTab==='skills')renderSkills();
    else if(G.sTab==='inv')renderInv();
    else renderLB();
  });
});

// ═══════════════════════════
//  CLOCK
// ═══════════════════════════
setInterval(()=>{sclock.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})},1000);

// ═══════════════════════════
//  EVENTS
// ═══════════════════════════
rbtn.addEventListener('click',()=>{const v=cin.value;cin.value='';renderSugs();runCmd(v);cin.focus();});
cin.addEventListener('keydown',e=>{
  if(e.key==='Enter'){const v=cin.value;cin.value='';renderSugs();runCmd(v);}
  else if(e.key==='ArrowUp'){e.preventDefault();if(G.histI<G.hist.length-1){G.histI++;cin.value=G.hist[G.histI];}}
  else if(e.key==='ArrowDown'){e.preventDefault();if(G.histI>0){G.histI--;cin.value=G.hist[G.histI];}else{G.histI=-1;cin.value='';}}
  else if(e.key==='Tab'){
    e.preventDefault();
    const v=cin.value.toLowerCase();
    const m=SUGS.filter(s=>s.startsWith(v)&&s!==v);
    if(m.length===1)cin.value=m[0];
    else if(m.length>1){appendCmdLine(cin.value);appendLine('cd',m.join('   '));saveTL();}
  }
});
cin.addEventListener('input',()=>renderSugs(cin.value.toLowerCase()));

document.getElementById('btnClear').addEventListener('click',()=>{clearOutput();cin.focus();});
document.getElementById('btnWrap').addEventListener('click',function(){
  G.wrap=!G.wrap;this.classList.toggle('on',G.wrap);
  output.querySelectorAll('.out').forEach(el=>el.style.whiteSpace=G.wrap?'pre-wrap':'pre');
});
document.getElementById('btnHint').addEventListener('click',()=>{
  if(G.coins<1){toast('💸','No Coins!','Earn coins by answering quizzes');return;}
  if(!G.challenge){appendLine('cm','  💡 Type "quiz" to start a challenge first');return;}
  G.coins=Math.max(0,G.coins-1);updHUD();
  const ch=G.challenge;
  if(ch.type==='quiz')appendLine('cs',`  💡 Hint: the answer starts with "${ch.opts[ch.correct][0]}"`);
  else appendLine('cs',`  💡 Hint: "${ch.answer.slice(0,Math.ceil(ch.answer.length/2))}…"`);
});
document.getElementById('btnSkip').addEventListener('click',()=>{
  if(!G.challenge){appendLine('cm','  No active challenge.');return;}
  appendLine('cw','  ⏭ Skipped (no XP earned)');
  G.challenge=null;G.challengeIdx++;setTimeout(showChallenge,500);
});
addTab.addEventListener('click',newTab);
lvlupBtn.addEventListener('click',()=>{lvlupEl.style.display='none';cin.focus();});
document.getElementById('btnSave').addEventListener('click',()=>{
  try{localStorage.setItem('tryit_v2',JSON.stringify({xp:G.xp,level:G.level,coins:G.coins,hp:G.hp,skills:G.skills,achievements:[...G.achievements],world:G.world}));}catch(e){}
  toast('💾','Game Saved!','Progress stored locally');
});
document.getElementById('btnSound').addEventListener('click',function(){this.classList.toggle('on');});
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='l'){e.preventDefault();clearOutput();}
  if(e.key==='Enter'&&document.activeElement!==cin)advStory();
});
document.querySelector('.tpanel').addEventListener('click',e=>{
  if(!e.target.closest('.tbar')&&!e.target.closest('.story')&&!e.target.closest('.qblock'))cin.focus();
});

// ═══════════════════════════
//  LOAD SAVE
// ═══════════════════════════
try{
  const sv=JSON.parse(localStorage.getItem('tryit_v2')||'null');
  if(sv){
    G.xp=sv.xp||0;G.level=sv.level||1;G.coins=sv.coins||0;G.hp=sv.hp||3;
    if(sv.skills)Object.assign(G.skills,sv.skills);
    if(sv.achievements)sv.achievements.forEach(a=>G.achievements.add(a));
    if(sv.world){G.world=sv.world;WORLDS.forEach((w,i)=>{if(i<=G.world)w.locked=false;});}
  }
}catch(e){}

  {c:'cy',v:'    ██║   ██║  ██║   ██║   ██║   ██║   '},
  {c:'cy',v:'    ╚═╝   ╚═╝  ╚═╝   ╚═╝   ╚═╝   ╚═╝   '},
  {c:'',v:''},

  {c:'cd',v:'  ↑↓ history   Tab autocomplete   💡 hint (1🪙)'},
